name: Dev Build

on:
  push:
    branches: [main]
    paths:
      - "package/**"
      - "target/**"
      - "include/**"
      - "defconfig/**"
      - "feeds.conf.default"
      - "Makefile"
      - "rules.mk"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-firmware:
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl libelf-dev \
            subversion swig time

      - name: Restore toolchain + download cache
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            staging_dir
            dl
          key: immortalwrt-viettel-only-ubuntu2404-${{ hashFiles('feeds.conf.default', 'defconfig/viettel-only.config') }}-v1
          restore-keys: |
            immortalwrt-viettel-only-ubuntu2404-

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare .config (Viettel NR3053 + VHT-32X6 only)
        run: |
          cp defconfig/viettel-only.config .config
          make defconfig
          enabled=$(grep -c '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_.*=y' .config)
          if [ "$enabled" -ne 2 ]; then
            echo "::error::Expected exactly 2 Viettel devices in .config, got $enabled" >&2
            grep '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_.*=y' .config >&2 || true
            exit 1
          fi

      - name: Build firmware
        run: |
          make -j$(nproc) V=sc 2>&1 | tee /tmp/build.log || {
            echo "::warning::Parallel build failed, retrying with -j1..."
            make -j1 V=sc 2>&1 | tail -200
          }

      - name: Collect firmware artifacts
        run: |
          mkdir -p dist
          shopt -s nullglob
          for pattern in '*viettel_nr3053*' '*vht_32x6*'; do
            cp bin/targets/mediatek/filogic/$pattern dist/ 2>/dev/null || true
          done
          # Chỉ kiểm tra file image thiết bị (*.itb, *.bin), bỏ qua metadata (.manifest, *.buildinfo, …)
          for f in bin/targets/mediatek/filogic/*.itb bin/targets/mediatek/filogic/*.bin; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            case "$base" in
              *viettel_nr3053*|*vht_32x6*) ;;
              *)
                echo "::error::Unexpected device image (not NR3053/32X6): $base" >&2
                exit 1
                ;;
            esac
          done
          ls -la dist/
          test "$(ls -1 dist/ | wc -l)" -ge 1

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-filogic-dev-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

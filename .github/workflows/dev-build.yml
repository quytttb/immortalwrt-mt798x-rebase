name: Dev Build

on:
  push:
    branches: [main]
    paths:
      - "package/**"
      - "target/**"
      - "include/**"
      - "defconfig/**"
      - "feeds.conf.default"
      - "Makefile"
      - "rules.mk"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-firmware:
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v7

      - name: Maximize build disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Read version
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl libelf-dev \
            subversion swig time

      # Cache toolchain riêng: host tools + cross-compiler (ít thay đổi, ~2GB)
      - name: Restore toolchain cache
        id: cache-toolchain
        uses: actions/cache/restore@v5
        with:
          path: |
            staging_dir/host
            staging_dir/toolchain-aarch64_cortex-a53_gcc-*
          key: openwrt-toolchain-filogic-aarch64-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1
          restore-keys: |
            openwrt-toolchain-filogic-aarch64-ubuntu2404-

      - name: Restore download cache
        id: cache-dl
        uses: actions/cache/restore@v5
        with:
          path: dl
          # Key unique mỗi run → luôn restore qua restore-keys (cache mới nhất)
          key: openwrt-dl-filogic-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1-${{ github.run_id }}
          restore-keys: |
            openwrt-dl-filogic-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1-

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Clone custom packages
        run: |
          git clone --depth 1 https://github.com/eamonxg/luci-theme-aurora.git package/luci-theme-aurora
          rm -rf package/luci-theme-aurora/.git
          git clone --depth 1 https://github.com/eamonxg/luci-app-aurora-config.git package/luci-app-aurora-config
          rm -rf package/luci-app-aurora-config/.git

      - name: Apply custom translations and defaults
        run: |
          cp custom-files/vi-upnp.po feeds/luci/applications/luci-app-upnp/po/vi/upnp.po
          mkdir -p package/base-files/files/etc/uci-defaults
          cp custom-files/99-viettel-custom-defaults package/base-files/files/etc/uci-defaults/99-viettel-custom-defaults

      - name: Prepare .config (Viettel NR3053 + VHT-32X6 only)
        run: |
          cp defconfig/viettel-only.config .config
          make defconfig
          enabled=$(grep -c '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_.*=y' .config)
          if [ "$enabled" -ne 2 ]; then
            echo "::error::Expected exactly 2 Viettel devices in .config, got $enabled" >&2
            grep '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_.*=y' .config >&2 || true
            exit 1
          fi

      - name: Build firmware
        run: |
          df -h /
          make -j$(nproc) V=s || {
            echo "::warning::Parallel build failed, retrying with -j1..."
            make -j1 V=s 2>&1 | tail -200
          }

      - name: Collect firmware artifacts
        run: |
          mkdir -p dist
          shopt -s nullglob
          cp bin/targets/mediatek/filogic/*viettel_nr3053* dist/ 2>/dev/null || true
          cp bin/targets/mediatek/filogic/*vht_32x6* dist/ 2>/dev/null || true
          cp bin/targets/mediatek/filogic/sha256sums dist/ 2>/dev/null || true
          ls -la dist/
          test "$(ls -1 dist/ | wc -l)" -ge 1

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: immortalwrt-filogic-dev-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: Free disk before cache save
        if: always()
        run: |
          echo "=== Before cleanup ==="
          df -h /
          du -sh build_dir bin tmp staging_dir dl 2>/dev/null || true
          rm -rf build_dir bin tmp logs feeds
          rm -rf staging_dir/target-* staging_dir/packages
          echo "=== After cleanup (keep host + toolchain + dl for cache) ==="
          df -h /
          du -sh staging_dir/host staging_dir/toolchain-* dl 2>/dev/null || true

      - name: Save toolchain cache
        # GitHub không cho ghi đè cache cùng key — chỉ save khi lần đầu (cache miss)
        if: always() && steps.cache-toolchain.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            staging_dir/host
            staging_dir/toolchain-aarch64_cortex-a53_gcc-*
          key: openwrt-toolchain-filogic-aarch64-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1

      - name: Save download cache
        # Key unique mỗi run → luôn tạo entry mới (dl tích lũy tarball mới)
        if: always()
        uses: actions/cache/save@v5
        with:
          path: dl
          key: openwrt-dl-filogic-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1-${{ github.run_id }}

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck (project scripts)
        run: |
          find scripts/unlock/ -name "*.sh" -exec shellcheck --severity=warning {} +

      - name: Install ruff
        run: pip install --quiet ruff

      - name: ruff (unlock Python scripts)
        run: ruff check scripts/unlock/

      - name: Verify Viettel-only defconfig
        run: |
          enabled=$(grep -c '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_.*=y' defconfig/viettel-only.config)
          if [ "$enabled" -ne 2 ]; then
            echo "::error::viettel-only.config must enable exactly 2 devices, got $enabled" >&2
            exit 1
          fi
          grep -q "viettel_nr3053" defconfig/viettel-only.config
          grep -q "viettel_32x6" defconfig/viettel-only.config
          ! grep -q "DEVICE_xiaomi" defconfig/viettel-only.config
          echo "Viettel-only defconfig OK (NR3053 + 32X6)."

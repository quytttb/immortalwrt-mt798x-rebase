name: Build Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag (need vMAJOR.MINOR.PATCH): ${TAG}" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"


  build-firmware:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v7

      - name: Maximize build disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl libelf-dev \
            subversion swig time

      - name: Restore toolchain cache
        id: cache-toolchain
        uses: actions/cache/restore@v5
        with:
          path: |
            staging_dir/host
            staging_dir/toolchain-aarch64_cortex-a53_gcc-*
          key: openwrt-toolchain-filogic-aarch64-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1
          restore-keys: |
            openwrt-toolchain-filogic-aarch64-ubuntu2404-

      - name: Restore download cache
        id: cache-dl
        uses: actions/cache/restore@v5
        with:
          path: dl
          key: openwrt-dl-filogic-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1-${{ github.run_id }}
          restore-keys: |
            openwrt-dl-filogic-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1-

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare .config (Viettel NR3053 + VHT-32X6 only)
        run: |
          cp defconfig/viettel-only.config .config
          make defconfig
          enabled=$(grep -c '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_.*=y' .config)
          if [ "$enabled" -ne 2 ]; then
            echo "::error::Expected exactly 2 Viettel devices in .config, got $enabled" >&2
            exit 1
          fi

      - name: Build firmware
        run: |
          df -h /
          make -j$(nproc) V=s || {
            echo "::warning::Parallel build failed, retrying with -j1..."
            make -j1 V=s 2>&1 | tail -200
          }

      - name: Collect firmware artifacts
        run: |
          mkdir -p dist
          shopt -s nullglob
          cp bin/targets/mediatek/filogic/*viettel_nr3053* dist/ 2>/dev/null || true
          cp bin/targets/mediatek/filogic/*vht_32x6* dist/ 2>/dev/null || true
          cp bin/targets/mediatek/filogic/sha256sums dist/ 2>/dev/null || true
          ls -la dist/
          test "$(ls -1 dist/ | wc -l)" -ge 1

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: immortalwrt-filogic-${{ needs.prepare.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Free disk before cache save
        if: always()
        run: |
          echo "=== Before cleanup ==="
          df -h /
          du -sh build_dir bin tmp staging_dir dl 2>/dev/null || true
          rm -rf build_dir bin tmp logs feeds
          rm -rf staging_dir/target-* staging_dir/packages
          echo "=== After cleanup (keep host + toolchain + dl for cache) ==="
          df -h /
          du -sh staging_dir/host staging_dir/toolchain-* dl 2>/dev/null || true

      - name: Save toolchain cache
        if: always() && steps.cache-toolchain.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            staging_dir/host
            staging_dir/toolchain-aarch64_cortex-a53_gcc-*
          key: openwrt-toolchain-filogic-aarch64-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1

      - name: Save download cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: dl
          key: openwrt-dl-filogic-ubuntu2404-${{ hashFiles('feeds.conf.default') }}-v1-${{ github.run_id }}


  release:
    needs: [prepare, build-firmware]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ImmortalWrt ${{ needs.prepare.outputs.version }} — NR3053 & VHT-32X6
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          body: |
            ## ImmortalWrt ${{ needs.prepare.outputs.version }}

            ImmortalWrt 25.12 (filogic / MT7981) cho Viettel NR3053 và VHT-32X6V1.

            | Thiết bị | File | Cách dùng |
            |----------|------|-----------|
            | Viettel NR3053 | `*viettel_nr3053*-sysupgrade.itb` | sysupgrade / TFTP |
            | Viettel NR3053 (recovery) | `*viettel_nr3053*-initramfs-recovery.itb` | UART / TFTP recovery |
            | Viettel VHT-32X6V1 | `*vht_32x6*-sysupgrade.itb` | sysupgrade / TFTP |
            | Viettel VHT-32X6V1 (recovery) | `*vht_32x6*-initramfs-recovery.itb` | UART / TFTP recovery |

            Built from tag `${{ needs.prepare.outputs.tag }}`.
          files: |
            release-assets/**/*.itb
            release-assets/**/*.bin
            release-assets/**/sha256sums

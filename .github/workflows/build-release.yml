name: Build Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag (need vMAJOR.MINOR.PATCH): ${TAG}" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"


  build-firmware:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl libelf-dev \
            subversion swig time

      - name: Restore toolchain + download cache
        uses: actions/cache@v4
        with:
          path: |
            staging_dir
            dl
          key: immortalwrt-viettel-only-ubuntu2404-${{ hashFiles('feeds.conf.default', 'defconfig/viettel-only.config') }}-v1
          restore-keys: |
            immortalwrt-viettel-only-ubuntu2404-

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare .config (Viettel NR3053 + VHT-32X6 only)
        run: |
          cp defconfig/viettel-only.config .config
          make defconfig
          enabled=$(grep -c '^CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_.*=y' .config)
          if [ "$enabled" -ne 2 ]; then
            echo "::error::Expected exactly 2 Viettel devices in .config, got $enabled" >&2
            exit 1
          fi

      - name: Build firmware
        run: |
          make -j$(nproc) V=sc 2>&1 | tee /tmp/build.log || {
            echo "::warning::Parallel build failed, retrying with -j1..."
            make -j1 V=sc 2>&1 | tail -200
          }

      - name: Collect firmware artifacts
        run: |
          mkdir -p dist
          shopt -s nullglob
          for pattern in '*viettel_nr3053*' '*vht_32x6*'; do
            cp bin/targets/mediatek/filogic/$pattern dist/ 2>/dev/null || true
          done
          for f in bin/targets/mediatek/filogic/*; do
            base=$(basename "$f")
            case "$base" in
              *viettel_nr3053*|*vht_32x6*|profiles.json|version.buildinfo|config.buildinfo|feeds.buildinfo|sha256sums|packages|kmods|u-boot-*)
                ;;
              *)
                echo "::error::Unexpected firmware artifact (not NR3053/32X6): $base" >&2
                exit 1
                ;;
            esac
          done
          ls -la dist/
          test "$(ls -1 dist/ | wc -l)" -ge 1

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-filogic-${{ needs.prepare.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 14


  release:
    needs: [prepare, build-firmware]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ImmortalWrt ${{ needs.prepare.outputs.version }} — NR3053 & VHT-32X6
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          body: |
            ## ImmortalWrt ${{ needs.prepare.outputs.version }}

            ImmortalWrt 25.12 (filogic / MT7981) cho Viettel NR3053 và VHT-32X6V1.

            | Thiết bị | File | Cách dùng |
            |----------|------|-----------|
            | Viettel NR3053 | `*viettel_nr3053*-sysupgrade.itb` | sysupgrade / TFTP |
            | Viettel NR3053 (recovery) | `*viettel_nr3053*-initramfs-recovery.itb` | UART / TFTP recovery |
            | Viettel VHT-32X6V1 | `*vht_32x6*-sysupgrade.itb` | sysupgrade / TFTP |
            | Viettel VHT-32X6V1 (recovery) | `*vht_32x6*-initramfs-recovery.itb` | UART / TFTP recovery |

            Built from tag `${{ needs.prepare.outputs.tag }}`.
          files: |
            release-assets/**/*.itb
            release-assets/**/*.bin
            release-assets/**/sha256sums
